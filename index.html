<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HyperExcellence</title>

    <!-- PWA : manifest et icones -->
    <link rel="manifest" href="/HyperExcellence/manifest.json" />
    <link rel="icon" type="image/png" href="/HyperExcellence/icon-192.png" />
    <link rel="apple-touch-icon" href="/HyperExcellence/apple-touch-icon.png" />
    <meta name="theme-color" content="#0B3D91" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HyperExcellence" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/HyperExcellence/sw.js')
            .catch((err) => console.log('Service Worker non enregistre:', err));
        });
      }
    </script>
  </body>
</html>
